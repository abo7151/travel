<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的旅遊行程導覽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; background-color: #F8FAFC; }
        .trip-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .trip-card:hover { transform: translateY(-4px); }
        .bg-pattern { background-image: radial-gradient(#E2E8F0 1px, transparent 1px); background-size: 20px 20px; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="min-h-screen relative pb-20">
    <div class="absolute inset-0 bg-pattern opacity-50 z-[-1]"></div>

    <!-- Header -->
    <header class="pt-16 pb-12 px-6 text-center">
        <div class="inline-flex items-center justify-center p-4 bg-gradient-to-br from-sky-100 to-indigo-100 rounded-full text-indigo-600 mb-6 shadow-sm">
            <i data-lucide="plane-takeoff" class="w-10 h-10"></i>
        </div>
        <h1 class="text-4xl md:text-5xl font-black text-slate-800 tracking-tight mb-4">專屬旅遊行程總覽</h1>
        <p class="text-lg text-slate-500 max-w-lg mx-auto font-medium">記錄每一次的足跡與回憶，隨時準備下一次的啟航。</p>
    </header>

    <main class="max-w-6xl mx-auto px-6">
        <!-- Upcoming Trips -->
        <section class="mb-16">
            <div class="flex items-center mb-8">
                <h2 class="text-2xl font-bold text-slate-800 flex items-center">
                    <i data-lucide="calendar-clock" class="w-6 h-6 mr-2 text-emerald-500"></i> 即將出發
                </h2>
                <div class="ml-4 h-px flex-grow bg-slate-200"></div>
            </div>
            <div id="upcoming-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Upcoming Cards -->
            </div>
            <div id="upcoming-empty" class="hidden text-center py-12 bg-white/50 backdrop-blur-sm rounded-3xl border border-slate-200 border-dashed">
                <i data-lucide="calendar-off" class="w-12 h-12 text-slate-300 mx-auto mb-3"></i>
                <p class="text-slate-500 font-medium">目前沒有即將出發的行程</p>
            </div>
        </section>

        <!-- Past Trips -->
        <section>
            <div class="flex items-center mb-8">
                <h2 class="text-2xl font-bold text-slate-400 flex items-center">
                    <i data-lucide="archive" class="w-6 h-6 mr-2"></i> 過期回憶
                </h2>
                <div class="ml-4 h-px flex-grow bg-slate-200"></div>
            </div>
            <div id="past-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Past Cards -->
            </div>
            <div id="past-empty" class="hidden text-center py-12 bg-slate-50/50 rounded-3xl border border-slate-200 border-dashed">
                <i data-lucide="folder-open" class="w-12 h-12 text-slate-200 mx-auto mb-3"></i>
                <p class="text-slate-400 font-medium">目前沒有已結束的行程</p>
            </div>
        </section>
    </main>

    <footer class="text-center mt-20 text-slate-400 text-sm font-medium">
        <p>© 2026 World Adventure Planner</p>
    </footer>

    <script>
        // 直接寫死三個行程的資料
        const trips = [
            {
                id: "tokyo-2026",
                title: "2026 東京之旅 | 專屬行程規劃",
                fileName: "tokyo-2026.html",
                startDate: "2026-04-30",
                endDate: "2026-05-03",
                location: "日本 ‧ 東京近郊",
                icon: "train",
                theme: "blue",
                description: "初夏的東京小旅行，享受近郊的鐵道風光與美食。"
            },
            {
                id: "swiss-2026",
                title: "2026 義瑞盛夏自然之旅",
                fileName: "swiss-2026.html",
                startDate: "2026-08-07",
                endDate: "2026-08-18",
                location: "瑞士 ‧ 義大利",
                icon: "mountain-snow",
                theme: "emerald",
                description: "11天深度精華規劃，高容錯、低疲勞的完美親子大自然旅行。"
            },
            {
                id: "kyushu-2027",
                title: "2027 九州 ‧ 北海道 深度家庭旅遊",
                fileName: "kyushu-2027.html",
                startDate: "2027-01-24",
                endDate: "2027-02-04",
                location: "日本 ‧ 九州/北海道",
                icon: "car",
                theme: "orange",
                description: "從南到北的冬季深度自駕，橫跨九州溫泉與北海道雪景的極致壯遊。"
            }
        ];

        // 佈景主題定義
        const themes = {
            blue: { bg: "bg-blue-50", text: "text-blue-600", border: "border-blue-100", hover: "hover:border-blue-300", gradient: "to-blue-50" },
            emerald: { bg: "bg-emerald-50", text: "text-emerald-600", border: "border-emerald-100", hover: "hover:border-emerald-300", gradient: "to-emerald-50" },
            orange: { bg: "bg-orange-50", text: "text-orange-600", border: "border-orange-100", hover: "hover:border-orange-300", gradient: "to-orange-50" },
            slate: { bg: "bg-slate-100", text: "text-slate-500", border: "border-slate-200", hover: "hover:border-slate-300", gradient: "to-slate-50" }
        };

        // 計算剩餘天數
        function calculateDaysLeft(startDate) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const start = new Date(startDate);
            const diffTime = start - today;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        }

        // 產生卡片 HTML
        function createCard(trip, isPast) {
            // 如果過期則套用灰色系
            const theme = isPast ? themes.slate : (themes[trip.theme] || themes.blue);
            const opacityClass = isPast ? "opacity-75 hover:opacity-100 grayscale-[0.2]" : "";
            
            const start = new Date(trip.startDate);
            const end = new Date(trip.endDate);
            const dateString = `${start.getFullYear()}/${start.getMonth()+1}/${start.getDate()} - ${end.getMonth()+1}/${end.getDate()}`;
            
            // 決定徽章 (Badge)
            let badgeHtml = "";
            if (!isPast) {
                const daysLeft = calculateDaysLeft(trip.startDate);
                if (daysLeft === 0) {
                    badgeHtml = `<span class="bg-red-100 text-red-700 text-xs font-bold px-2.5 py-1 rounded-full animate-pulse border border-red-200 shadow-sm">出發！</span>`;
                } else if (daysLeft > 0 && daysLeft <= 30) {
                    badgeHtml = `<span class="bg-amber-100 text-amber-700 text-xs font-bold px-2.5 py-1 rounded-full border border-amber-200 shadow-sm">倒數 ${daysLeft} 天</span>`;
                } else if (daysLeft > 30) {
                    badgeHtml = `<span class="bg-slate-100 text-slate-600 text-xs font-bold px-2.5 py-1 rounded-full border border-slate-200 shadow-sm">還有 ${daysLeft} 天</span>`;
                }
            } else {
                badgeHtml = `<span class="bg-slate-200 text-slate-500 text-xs font-bold px-2.5 py-1 rounded-full border border-slate-300">已結束</span>`;
            }

            return `
                <a href="${trip.fileName}" class="trip-card block bg-white rounded-3xl p-6 border ${theme.border} ${theme.hover} shadow-sm hover:shadow-xl ${opacityClass} relative overflow-hidden group">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br from-white ${theme.gradient} rounded-bl-full z-0 opacity-50 group-hover:scale-125 transition-transform duration-500"></div>
                    <div class="relative z-10">
                        <div class="flex justify-between items-start mb-5">
                            <div class="p-3 ${theme.bg} ${theme.text} rounded-2xl shadow-sm">
                                <i data-lucide="${trip.icon}" class="w-7 h-7"></i>
                            </div>
                            <div>${badgeHtml}</div>
                        </div>
                        <h3 class="text-xl font-bold text-slate-800 mb-2 leading-tight group-hover:text-indigo-600 transition-colors">${trip.title}</h3>
                        <div class="flex items-center text-sm text-slate-500 mb-3 font-medium">
                            <i data-lucide="map-pin" class="w-4 h-4 mr-1.5 text-slate-400"></i> ${trip.location}
                        </div>
                        <div class="inline-flex items-center text-xs text-slate-500 mb-4 font-mono bg-slate-50 border border-slate-100 px-2.5 py-1 rounded-md">
                            <i data-lucide="calendar" class="w-3.5 h-3.5 mr-1.5 text-slate-400"></i> ${dateString}
                        </div>
                        <p class="text-sm text-slate-600 line-clamp-2 leading-relaxed">${trip.description}</p>
                        
                        <div class="mt-5 pt-4 border-t border-slate-50 flex items-center text-sm font-bold ${theme.text} opacity-0 group-hover:opacity-100 transition-all transform -translate-x-2 group-hover:translate-x-0">
                            檢視行程表 <i data-lucide="arrow-right" class="w-4 h-4 ml-1"></i>
                        </div>
                    </div>
                </a>
            `;
        }

        function renderTrips() {
            // 設定今日，並將時間歸零以做純日期比較
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            const upcoming = [];
            const past = [];

            trips.forEach(trip => {
                const endDate = new Date(trip.endDate);
                endDate.setHours(23, 59, 59, 999);
                
                // 判斷邏輯：如果結束日期小於今天，就視為過期
                if (endDate < today) {
                    past.push(trip);
                } else {
                    upcoming.push(trip);
                }
            });

            // 排序邏輯
            // 即將出發：依出發日期「由近到遠」排序 (升冪)
            upcoming.sort((a, b) => new Date(a.startDate) - new Date(b.startDate));
            // 過期回憶：依結束日期「由近到遠」排序 (降冪，最近剛結束的在最上面)
            past.sort((a, b) => new Date(b.endDate) - new Date(a.endDate));

            // 渲染至畫面
            const upcomingList = document.getElementById('upcoming-list');
            const pastList = document.getElementById('past-list');

            if (upcoming.length > 0) {
                upcomingList.innerHTML = upcoming.map(t => createCard(t, false)).join('');
            } else {
                document.getElementById('upcoming-empty').classList.remove('hidden');
            }

            if (past.length > 0) {
                pastList.innerHTML = past.map(t => createCard(t, true)).join('');
            } else {
                document.getElementById('past-empty').classList.remove('hidden');
            }

            // 初始化 Lucide 圖標
            lucide.createIcons();
        }

        // 頁面載入後自動渲染
        document.addEventListener('DOMContentLoaded', renderTrips);
    </script>
</body>
</html>
