<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的旅遊行程入口網</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .trip-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200">
        <div class="max-w-5xl mx-auto px-6 py-12 text-center">
            <div class="inline-block p-3 bg-indigo-100 rounded-2xl text-indigo-600 mb-4">
                <i data-lucide="map" class="w-10 h-10"></i>
            </div>
            <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight">我的旅遊行程導覽</h1>
            <p class="mt-4 text-lg text-gray-500">所有的冒險紀錄，都在這裡開啟。</p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-6 py-12">
        <!-- 載入中狀態 -->
        <div id="loading" class="flex flex-col items-center justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
            <p class="mt-4 text-gray-500">正在同步 GitHub 行程檔案...</p>
        </div>

        <!-- 行程列表 -->
        <div id="trip-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- 動態產生的行程卡片將放在這裡 -->
        </div>

        <!-- 無檔案時顯示 -->
        <div id="empty-state" class="hidden text-center py-20">
            <i data-lucide="file-warning" class="w-16 h-16 text-gray-300 mx-auto mb-4"></i>
            <p class="text-gray-500 text-lg">目前儲存庫中沒有找到其他行程檔案。</p>
        </div>
    </main>

    <footer class="text-center py-12 text-gray-400 text-sm">
        <p>© 2026 World Adventure Planner</p>
    </footer>

    <script>
        // --- 請設定你的 GitHub 資訊 ---
        const GITHUB_USER = window.location.hostname.split('.')[0]; 
        const REPO_NAME = window.location.pathname.split('/')[1]; 

        async function fetchTrips() {
            const tripList = document.getElementById('trip-list');
            const loading = document.getElementById('loading');
            const emptyState = document.getElementById('empty-state');

            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/`);
                
                if (!response.ok) throw new Error('無法抓取資料');

                const files = await response.json();
                
                const htmlFiles = files.filter(file => 
                    file.name.endsWith('.html') && file.name !== 'index.html'
                );

                loading.classList.add('hidden');

                if (htmlFiles.length === 0) {
                    emptyState.classList.remove('hidden');
                    return;
                }

                htmlFiles.forEach(file => {
                    const card = createTripCard(file.name);
                    tripList.appendChild(card);
                });

                // 重新掃描並渲染圖標
                lucide.createIcons();

            } catch (error) {
                console.error('Error:', error);
                loading.innerHTML = `<p class="text-red-500">無法自動載入檔案。請確保此頁面部署於 GitHub Pages。</p>`;
            }
        }

        function createTripCard(fileName) {
            let displayName = fileName.replace('.html', '').replace(/-/g, ' ').replace(/_/g, ' ');
            displayName = displayName.split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');

            const div = document.createElement('div');
            div.className = 'trip-card bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-xl transition-all cursor-pointer';
            
            // 修正圖標關鍵字判斷
            let icon = 'compass';
            const nameLower = fileName.toLowerCase();
            
            if (nameLower.includes('tokyo') || nameLower.includes('japan')) icon = 'landmark'; // 改為有效圖標 landmark
            if (nameLower.includes('swiss') || nameLower.includes('mountain')) icon = 'mountain';
            if (nameLower.includes('plane') || nameLower.includes('flight')) icon = 'plane';
            if (nameLower.includes('food')) icon = 'utensils';
            if (nameLower.includes('shopping')) icon = 'shopping-bag';

            div.innerHTML = `
                <a href="${fileName}" class="block p-8">
                    <div class="flex items-center justify-between mb-6">
                        <div class="p-3 bg-gray-50 rounded-2xl text-gray-600">
                            <i data-lucide="${icon}" class="w-8 h-8"></i>
                        </div>
                        <i data-lucide="chevron-right" class="text-gray-300 w-5 h-5"></i>
                    </div>
                    <h3 class="text-xl font-bold text-gray-900 mb-2">${displayName}</h3>
                    <p class="text-sm text-gray-500 mb-4 font-mono">${fileName}</p>
                    <div class="flex items-center gap-2 text-indigo-600 font-medium text-sm">
                        查看行程詳情
                    </div>
                </a>
            `;
            return div;
        }

        window.onload = fetchTrips;
    </script>
</body>
</html>
